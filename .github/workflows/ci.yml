name: CI
on:
  push:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Install workspace dependencies
        run: |
          cd apps/web && npm install
          cd ../api && npm install
      - name: Lint
        run: cd apps/web && npm run lint --if-present
      - name: Typecheck
        run: cd apps/web && npm run typecheck --if-present
      - name: Test
        run: cd apps/web && npm run test --if-present
      - name: Build
        run: cd apps/web && npm run build
